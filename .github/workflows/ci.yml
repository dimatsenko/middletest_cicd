name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint with Flake8 (PEP8 check)
      if: always()
      run: |
        # Генеруємо HTML-звіт (не зупиняє виконання через --exit-zero)
        flake8 . --format=html --htmldir=flake8_report --exit-zero
        # Перевірка для логів та прийняття рішення про статус пайплайну
        flake8 .
        
    - name: Test with pytest
      if: always()
      run: |
        # Запуск тестів та генерація HTML-звіту
        pytest --html=pytest_report.html --self-contained-html
        
    - name: Upload Flake8 Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8-report
        path: flake8_report/
        
    - name: Upload Pytest Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-report
        path: pytest_report.html
